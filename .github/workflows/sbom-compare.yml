# target steps:
# download current SBOM (from github - SPDX format)
# download previous SBOM (from previous run artifact)
# - lack of github SBOM sort order detects changes incorectly, solution is to sort
# - occasional workflow failures and artifacts expiring will cause issues with previous artefact availability for a current run
#   - solution: create a 'previous' and 'current' SBOM in the same script (use CDX, newer more robust format)
# DIFF the SPDX files (prev from last action run)
# DIFF the CDX files (prev from last commit)
# create CSVs for easier human usability (sbom-to-excel would be nicer but the conversion tool is not robust and crashing on content)
# upload artifacts

# bug with V7 artifact upload
#  - CSV and MD extensions fail the artefact upload (bug is being worked on)
#  - workaround, use extension TXT on files that are normally CSV and MD

name: SBOM compare
on:
  pull_request:
    branches:
      - main
      - dev

  push:
    branches:
      - main
      - dev

permissions:
    actions: read
    contents: write

jobs:
  sbom-compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Fetch the previous commit for comparison
          ref: ${{ github.head_ref }}  # For PRs, checkout the head branch
         
      - name: Install Dependencies
        run: |
          # cdxgen (create current AND previous, in CDX format ) 
          #npm install -g @cyclonedx/cdxgen
          wget -O cdxgen https://github.com/cdxgen/cdxgen/releases/download/v12.1.1/cdxgen-linux-amd64
          chmod 777 cdxgen

          # cycloneDX (create CSV from either format SBOM)
          # suggested install requires brew (not present) download the asset directly
          wget -O cyclonedx https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.30.0/cyclonedx-linux-x64
          chmod 777 cyclonedx

          # sbomdiff (create a DIFF from either format SBOM into TXT)
          pip install sbomdiff

          # sbom-sorter
          git clone https://github.com/arturmartins/spdx-sorter.git

      - name: setup artefact folder
        run: mkdir .sbom

      - name: Get Previous Run ID
        id: get-run-id
        continue-on-error: true
        run: |
         RUN_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?branch=${{ github.ref_name }}" \
            | jq -r '.workflow_runs[1].id') # Fetch the second most recent run (index 1)
         echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Download current.spdx.json
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: .sbom
          name: current.spdx.json
          run-id: ${{ steps.get-run-id.outputs.run_id }}
          github-token:  ${{ secrets.GITHUB_TOKEN}} # may need a custom token ie: MY_PAT_TOKEN

      - name: Download comparison-history.md
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: .sbom
          name: comparison-history.md.txt
          run-id: ${{ steps.get-run-id.outputs.run_id }}
          github-token:  ${{ secrets.GITHUB_TOKEN}} # may need a custom token ie: MY_PAT_TOKEN

      - name: show downloaded artifacts
        run: ls -R .sbom    # gut check

      - name: Create SPDX SBOM files
        # SPDX previous is created by copying the SPDX current from the previous execution - if exists
        id: current-sbom-spdx
        continue-on-error: true
        run: |
          # copy current to previous then download new SBOM as current
          if test -f .sbom/current.spdx.json; then cp .sbom/current.spdx.json .sbom/previous.spdx.json; fi
          curl https://github.com/ssc-dsai/canchat-v2/dependency-graph/sbom | jq > .sbom/current.spdx.json
          python spdx-sorter/sort_spdx.py .sbom/current.spdx.json

      - name: Generate Current SBOM CDX format
        id: current-sbom-cdx
        run: |
          ./cdxgen -o .sbom/current.cdx.json --json-pretty
          echo "current_sbom=.sbom/current.cdx.json" >> $GITHUB_OUTPUT

      - name: Generate Previous SBOM CDX format
        id: previous-sbom-cdx
        continue-on-error: true
        run: |
          git checkout HEAD^
          ./cdxgen -o .sbom/previous.cdx.json --json-pretty
          echo "previous_sbom=.sbom/previous.cdx.json" >> $GITHUB_OUTPUT
          git checkout -

      - name: Create CSVs
        id: convert-sboms
        continue-on-error: true
        run: |
          ./cyclonedx convert --input-file .sbom/current.cdx.json --output-file .sbom/current.cdx.csv.txt --output-format csv
          ./cyclonedx convert --input-file .sbom/current.spdx.json --output-file .sbom/current.spdx.csv.txt --output-format csv

      - name: Compare CDX SBOMs
        id: compare-sbom-cdx
        continue-on-error: true
        run: |
          if test -f .sbom/previous.cdx.json; then 
            sbomdiff .sbom/previous.cdx.json .sbom/current.cdx.json --sbom cyclonedx --format text > .sbom/comparison.cdx.md.txt
          else
            echo "Unable to use the previous commit CDX SBOM. A previous commit may not exist." > .sbom/comparison.cdx.md.txt
          fi

      - name: Compare SPDX SBOMs
        id: compare-sbom-spdx
        continue-on-error: true
        run: |
          if test -f .sbom/previous.spdx.json; then 
            sbomdiff .sbom/previous.spdx.json .sbom/current.spdx.json --sbom spdx --format text > .sbom/comparison.spdx.md.txt
          else
            echo "Unable to use the previous run SPDX SBOM. The previous run may have failed." > .sbom/comparison.spdx.md.txt
          fi

      - name: Get PR number
        id: pr
        continue-on-error: true
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            # Extract PR number from the event payload
            PR_NUMBER=$(jq -r '.number' "$GITHUB_EVENT_PATH")
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "pr_number=none (push)" >> $GITHUB_OUTPUT
          fi
       
      - name: create summary
        id: create-summary
        continue-on-error: true
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S %Z")
          echo "# Pull Request Number: ${{ steps.pr.outputs.pr_number }}"  > .sbom/comparison.md.txt
          echo "## Run Timestamp: $TIMESTAMP" >> .sbom/comparison.md.txt
          
          # CDX version
          echo "" >> .sbom/comparison.md.txt
          echo "### Comparison of current CDX SBOM with previous commit" >> .sbom/comparison.md.txt
          cat .sbom/comparison.cdx.md.txt >> .sbom/comparison.md.txt # copy differnces to the historic version
          
          # SPDX version
          echo "" >> .sbom/comparison.md.txt
          echo "### Comparison of current SPDX SBOM with previous CI run" >> .sbom/comparison.md.txt
          cat .sbom/comparison.spdx.md.txt >> .sbom/comparison.md.txt # copy differnces to the historic version
          
          # prepend current comparison log to the top of the comparison history file (most recent first)
          echo "" >> .sbom/comparison.md.txt
          if test -f .sbom/comparison-history.md.txt; then cp .sbom/comparison-history.md.txt .sbom/old-comparison-history.md.txt; fi
          cp .sbom/comparison.md.txt .sbom/comparison-history.md.txt
          if test -f .sbom/old-comparison-history.md.txt; then 
            cat .sbom/old-comparison-history.md.txt >> .sbom/comparison-history.md.txt
          fi
          cat .sbom/comparison-history.md.txt >> $GITHUB_STEP_SUMMARY

      - name: show artifacts after all changes
        run: ls -R .sbom    # gut check

      - name: Upload comparison-history.md
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: comparison-history.md.txt
          include-hidden-files: true
          archive: false
          path: .sbom/comparison-history.md.txt

      - name: Upload comparison.md
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: comparison.md.txt
          archive: false
          include-hidden-files: true
          path: .sbom/comparison.md.txt

      - name: Upload current.cdx.csv
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: current.cdx.csv.txt
          archive: false
          include-hidden-files: true
          path: .sbom/current.cdx.csv.txt
          
      - name: Upload current.cdx.json
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: current.cdx.json
          archive: false
          include-hidden-files: true
          path: .sbom/current.cdx.json

      - name: Upload current.spdx.csv
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: current.spdx.csv.txt
          archive: false
          include-hidden-files: true
          path: .sbom/current.spdx.csv.txt
          
      - name: Upload current.spdx.json
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: current.spdx.json
          archive: false
          include-hidden-files: true
          path: .sbom/current.spdx.json
